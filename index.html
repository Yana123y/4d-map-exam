<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4D标注规范 & 行车MAP 考核题库</title>
<style>
:root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #555;
    --accent: #4f6ef7;
    --accent-hover: #3b54d4;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --border: #e2e8f0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --tag-bg: #eef2ff;
    --tag-text: #4f6ef7;
    --correct-bg: #d1fae5;
    --wrong-bg: #fee2e2;
    --selected-bg: #eef2ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 24px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.5px; }
.header .subtitle { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }

/* Container */
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* Start Screen */
.start-screen {
    text-align: center;
    padding: 60px 20px;
}
.start-screen .icon { font-size: 4rem; margin-bottom: 20px; }
.start-screen h2 { font-size: 1.8rem; margin-bottom: 12px; color: #1a1a2e; }
.start-screen .stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 24px 0; }
.stat-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px 28px;
    box-shadow: var(--shadow);
    min-width: 120px;
}
.stat-card .num { font-size: 2rem; font-weight: 800; color: var(--accent); }
.stat-card .label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }

.btn {
    display: inline-block;
    padding: 14px 40px;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,110,247,0.4); }
.btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
.btn-outline:hover { background: var(--accent); color: #fff; }
.btn-sm { padding: 8px 20px; font-size: 0.9rem; }
.btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }

/* Progress Bar */
.progress-wrap {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
}
.progress-bar {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    border-radius: 4px;
    transition: width 0.4s ease;
}
.progress-text { font-weight: 600; font-size: 0.9rem; white-space: nowrap; color: var(--text-secondary); }

/* Question Card */
.question-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    transition: all 0.3s;
}
.question-card.answered { border-left: 4px solid var(--accent); }
.question-card.correct { border-left: 4px solid var(--success); background: #f0fdf6; }
.question-card.wrong { border-left: 4px solid var(--danger); background: #fef9f9; }

.question-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 20px;
}
.question-number {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    min-width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.question-type {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-left: 8px;
}
.type-single { background: #dbeafe; color: #2563eb; }
.type-multi { background: #fef3c7; color: #d97706; }
.type-judge { background: #d1fae5; color: #059669; }

.question-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.7;
    flex: 1;
}

/* Options */
.options { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.95rem;
    user-select: none;
}
.option:hover { border-color: var(--accent); background: #f8faff; }
.option.selected { border-color: var(--accent); background: var(--selected-bg); }
.option.correct-answer { border-color: var(--success); background: var(--correct-bg); }
.option.wrong-answer { border-color: var(--danger); background: var(--wrong-bg); }
.option.disabled { pointer-events: none; opacity: 0.85; }

.option-marker {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.2s;
}
.option.selected .option-marker { background: var(--accent); color: #fff; border-color: var(--accent); }
.option.correct-answer .option-marker { background: var(--success); color: #fff; border-color: var(--success); }
.option.wrong-answer .option-marker { background: var(--danger); color: #fff; border-color: var(--danger); }

.option-label { flex: 1; }

/* Judge options */
.judge-options { display: flex; gap: 16px; }
.judge-btn {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: 600;
    transition: all 0.2s;
    user-select: none;
}
.judge-btn:hover { border-color: var(--accent); }
.judge-btn.selected { border-color: var(--accent); background: var(--selected-bg); }
.judge-btn.true-selected.correct-answer { border-color: var(--success); background: var(--correct-bg); }
.judge-btn.false-selected.correct-answer { border-color: var(--success); background: var(--correct-bg); }
.judge-btn.wrong-answer { border-color: var(--danger); background: var(--wrong-bg); }
.judge-btn.disabled { pointer-events: none; opacity: 0.85; }

/* Explanation */
.explanation {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f8fafc;
    border-radius: 8px;
    font-size: 0.9rem;
    color: var(--text-secondary);
    border-left: 3px solid var(--accent);
    display: none;
}
.explanation.show { display: block; }
.explanation .correct-ans { font-weight: 700; color: var(--success); }

/* Result Screen */
.result-screen { text-align: center; padding: 40px 20px; display: none; }
.result-screen .score-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2.5rem;
    font-weight: 800;
    border: 6px solid var(--accent);
    color: var(--accent);
}
.result-screen .score-label { font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
.result-summary { max-width: 400px; margin: 0 auto; text-align: left; }
.result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.result-row .val { font-weight: 700; }
.val.green { color: var(--success); }
.val.red { color: var(--danger); }

/* Navigation */
.nav-buttons { display: flex; justify-content: center; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
.nav-buttons .btn { min-width: 140px; }

/* Toast */
.toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; padding: 12px 24px;
    border-radius: 30px; font-weight: 600; z-index: 200;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
    pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Responsive */
@media (max-width: 640px) {
    .container { padding: 12px; }
    .question-card { padding: 18px; }
    .header h1 { font-size: 1.3rem; }
    .stat-card { min-width: 90px; padding: 14px 16px; }
    .stat-card .num { font-size: 1.5rem; }
}

/* Footer */
.footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="header">
    <h1>📋 4D标注规范 & 行车MAP 考核题库</h1>
    <div class="subtitle">随机抽取20题 · 模拟考核练习</div>
</div>

<div class="container">

    <!-- Start Screen -->
    <div id="startScreen" class="start-screen">
        <div class="icon">📝</div>
        <h2>准备开始考核</h2>
        <p style="color:#555;margin-bottom:8px;">系统将从题库中随机抽取 <strong>20道题目</strong>，涵盖单选题、多选题和判断题</p>
        <div class="stats">
            <div class="stat-card"><div class="num" id="totalCount">-</div><div class="label">题库总数</div></div>
            <div class="stat-card"><div class="num">20</div><div class="label">抽取题数</div></div>
            <div class="stat-card"><div class="num" id="estTime">~20</div><div class="label">预计分钟</div></div>
        </div>
        <button class="btn btn-primary" onclick="startExam()">🎯 开始答题</button>
    </div>

    <!-- Exam Screen -->
    <div id="examScreen" style="display:none;">
        <div class="progress-wrap">
            <span style="font-size:1.2rem;">📊</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <span class="progress-text" id="progressText">0 / 20</span>
        </div>
        <div id="questionsContainer"></div>
        <div class="nav-buttons">
            <button class="btn btn-outline btn-sm" id="prevBtn" onclick="prevQuestion()" disabled>◀ 上一题</button>
            <span id="questionIndicator" style="line-height:2.5;font-weight:600;color:var(--text-secondary);">第 1 / 20 题</span>
            <button class="btn btn-outline btn-sm" id="nextBtn" onclick="nextQuestion()">下一题 ▶</button>
            <button class="btn btn-primary btn-sm" id="submitBtn" onclick="submitExam()" style="display:none;">✅ 提交答卷</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="result-screen">
        <h2 style="margin-bottom:20px;">📊 考核结果</h2>
        <div class="score-circle" id="scoreCircle">0<span style="font-size:1rem;">分</span></div>
        <div class="result-summary">
            <div class="result-row"><span>✅ 正确</span><span class="val green" id="correctCount">0</span></div>
            <div class="result-row"><span>❌ 错误</span><span class="val red" id="wrongCount">0</span></div>
            <div class="result-row"><span>📋 总题数</span><span class="val">20</span></div>
            <div class="result-row"><span>📈 正确率</span><span class="val" id="accuracy">0%</span></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="reviewAnswers()">🔍 查看答案解析</button>
            <button class="btn btn-outline" onclick="retryExam()">🔄 重新抽题</button>
        </div>
    </div>

</div>

<div class="footer">4D标注规范考试题 & 行车MAP考题 · 随机模拟考核系统</div>

<script>
// ==================== QUESTION BANK ====================
const questionBank = [

    {id:5,type:"single",source:"4D标注规范",question:"非路口场景（高速/直行路）轨迹重复失效的判定是？",options:["采集场景重复时，轨迹条数＞2条","采集场景重复时，轨迹条数＞3条","采集场景重复时，轨迹条数＞5条","采集场景重复时，轨迹条数＞10条"],answer:1},

    {id:98,type:"judge",source:"行车MAP",question:"【行车MAP】路口前地面无箭头时，根据路口实际拓扑给转向。",answer:true},
    {id:99,type:"judge",source:"行车MAP",question:"【行车MAP】关于非机动车道的路口拓扑，无地面实际箭头时，连接原则为拓扑直行和右转即可。",answer:true},
    {id:100,type:"judge",source:"行车MAP",question:"【行车MAP】截图中箭头处视为安全岛，需要表达禁止通行区域，文字也需正常标注。",answer:true}
];

// ==================== APP LOGIC ====================
let selectedQuestions = [];
let currentIndex = 0;
let userAnswers = {};       // {questionId: answer} — answer is index for single, [indices] for multi, bool for judge
let examSubmitted = false;
const TOTAL = 20;

function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function init() {
    document.getElementById('totalCount').textContent = questionBank.length;
}

function startExam() {
    selectedQuestions = shuffle(questionBank).slice(0, TOTAL);
    currentIndex = 0;
    userAnswers = {};
    examSubmitted = false;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'block';
    document.getElementById('resultScreen').style.display = 'none';

    renderAllQuestions();
    showQuestion(0);
    updateNavButtons();
    updateProgress();
}

function renderAllQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = selectedQuestions.map((q, idx) => {
        const typeLabel = q.type === 'single' ? '单选题' : q.type === 'multi' ? '多选题' : '判断题';
        const typeClass = q.type === 'single' ? 'type-single' : q.type === 'multi' ? 'type-multi' : 'type-judge';
        let optionsHtml = '';
        if (q.type === 'judge') {
            optionsHtml = `
                <div class="judge-options">
                    <div class="judge-btn true-btn" onclick="selectJudge(${q.id}, true, this)" data-qid="${q.id}" data-val="true">✅ 正确</div>
                    <div class="judge-btn false-btn" onclick="selectJudge(${q.id}, false, this)" data-qid="${q.id}" data-val="false">❌ 错误</div>
                </div>`;
        } else {
            optionsHtml = `<ul class="options">` + q.options.map((opt, oi) => {
                const marker = String.fromCharCode(65 + oi); // A, B, C, D...
                return `
                <li class="option" onclick="selectOption(${q.id}, ${oi}, this)" data-qid="${q.id}" data-oidx="${oi}">
                    <span class="option-marker">${marker}</span>
                    <span class="option-label">${opt}</span>
                </li>`;
            }).join('') + '</ul>';
        }
        return `
        <div class="question-card" id="qcard-${q.id}" style="display:none;">
            <div class="question-header">
                <div class="question-number">${idx + 1}</div>
                <div class="question-text">
                    ${q.question}
                    <span class="question-type ${typeClass}">${typeLabel}</span>
                    <span style="font-size:0.75rem;color:#94a3b8;margin-left:6px;">[${q.source}]</span>
                </div>
            </div>
            ${optionsHtml}
            <div class="explanation" id="explain-${q.id}"></div>
        </div>`;
    }).join('');
}

function showQuestion(idx) {
    // Hide all
    document.querySelectorAll('.question-card').forEach(c => c.style.display = 'none');
    // Show current
    const q = selectedQuestions[idx];
    const card = document.getElementById('qcard-' + q.id);
    if (card) card.style.display = 'block';
    // Restore visual state
    restoreVisualState(q.id);
    updateNavButtons();
    updateProgress();
}

function restoreVisualState(qid) {
    const q = selectedQuestions.find(q => q.id === qid);
    if (!q) return;
    const ans = userAnswers[qid];

    if (q.type === 'judge') {
        const trueBtn = document.querySelector(`.true-btn[data-qid="${qid}"]`);
        const falseBtn = document.querySelector(`.false-btn[data-qid="${qid}"]`);
        if (trueBtn) trueBtn.classList.remove('selected');
        if (falseBtn) falseBtn.classList.remove('selected');
        if (ans === true && trueBtn) trueBtn.classList.add('selected');
        if (ans === false && falseBtn) falseBtn.classList.add('selected');
    } else if (q.type === 'single') {
        document.querySelectorAll(`.option[data-qid="${qid}"]`).forEach(opt => {
            opt.classList.remove('selected');
            if (parseInt(opt.dataset.oidx) === ans) opt.classList.add('selected');
        });
    } else if (q.type === 'multi') {
        document.querySelectorAll(`.option[data-qid="${qid}"]`).forEach(opt => {
            opt.classList.remove('selected');
            if (ans && ans.includes(parseInt(opt.dataset.oidx))) opt.classList.add('selected');
        });
    }
}

function selectOption(qid, oidx, el) {
    if (examSubmitted) return;
    const q = selectedQuestions.find(q => q.id === qid);
    if (!q) return;

    if (q.type === 'single') {
        userAnswers[qid] = oidx;
        document.querySelectorAll(`.option[data-qid="${qid}"]`).forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    } else if (q.type === 'multi') {
        if (!userAnswers[qid]) userAnswers[qid] = [];
        const arr = userAnswers[qid];
        const idx = arr.indexOf(oidx);
        if (idx >= 0) {
            arr.splice(idx, 1);
            el.classList.remove('selected');
        } else {
            arr.push(oidx);
            el.classList.add('selected');
        }
    }

    // Mark card as answered
    updateCardStatus(qid);
    updateProgress();
}

function selectJudge(qid, val, el) {
    if (examSubmitted) return;
    userAnswers[qid] = val;
    document.querySelectorAll(`.true-btn[data-qid="${qid}"], .false-btn[data-qid="${qid}"]`)
        .forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    updateCardStatus(qid);
    updateProgress();
}

function updateCardStatus(qid) {
    const card = document.getElementById('qcard-' + qid);
    if (card && userAnswers[qid] !== undefined) {
        card.classList.add('answered');
    }
}

function updateProgress() {
    const answered = Object.keys(userAnswers).length;
    const pct = Math.round((answered / TOTAL) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = answered + ' / ' + TOTAL;
    // Question indicator
    document.getElementById('questionIndicator').textContent = `第 ${currentIndex + 1} / ${TOTAL} 题`;
}

function updateNavButtons() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    const isLast = currentIndex === TOTAL - 1;
    document.getElementById('nextBtn').style.display = isLast ? 'none' : '';
    document.getElementById('submitBtn').style.display = isLast ? 'inline-block' : 'none';
    document.getElementById('questionIndicator').textContent = `第 ${currentIndex + 1} / ${TOTAL} 题`;

    // Check if all answered to enable submit
    if (isLast) {
        const allAnswered = Object.keys(userAnswers).length === TOTAL;
        document.getElementById('submitBtn').disabled = !allAnswered;
        if (!allAnswered) {
            document.getElementById('submitBtn').textContent = '⚠️ 还有题目未作答';
            document.getElementById('submitBtn').style.opacity = '0.6';
        } else {
            document.getElementById('submitBtn').textContent = '✅ 提交答卷';
            document.getElementById('submitBtn').style.opacity = '1';
        }
    }
}

function nextQuestion() {
    if (currentIndex < TOTAL - 1) {
        currentIndex++;
        showQuestion(currentIndex);
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        showQuestion(currentIndex);
    }
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
    if (document.getElementById('examScreen').style.display === 'none') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextQuestion(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevQuestion(); }
});

function submitExam() {
    const unanswered = TOTAL - Object.keys(userAnswers).length;
    if (unanswered > 0) {
        showToast(`还有 ${unanswered} 道题未作答，请完成后再提交`);
        // Jump to first unanswered
        for (let i = 0; i < TOTAL; i++) {
            if (userAnswers[selectedQuestions[i].id] === undefined) {
                currentIndex = i;
                showQuestion(currentIndex);
                break;
            }
        }
        return;
    }
    if (!confirm('确定要提交答卷吗？提交后无法修改。')) return;
    examSubmitted = true;
    showResults();
}

function showResults() {
    let correct = 0, wrong = 0;
    selectedQuestions.forEach(q => {
        const userAns = userAnswers[q.id];
        if (q.type === 'single') {
            if (userAns === q.answer) correct++; else wrong++;
        } else if (q.type === 'multi') {
            const sortedUser = userAns ? userAns.slice().sort() : [];
            const sortedCorrect = q.answer.slice().sort();
            if (JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect)) correct++; else wrong++;
        } else if (q.type === 'judge') {
            if (userAns === q.answer) correct++; else wrong++;
        }
    });

    const score = Math.round((correct / TOTAL) * 100);

    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('scoreCircle').innerHTML = score + '<span style="font-size:1rem;">分</span>';
    document.getElementById('correctCount').textContent = correct + ' 题';
    document.getElementById('wrongCount').textContent = wrong + ' 题';
    document.getElementById('accuracy').textContent = score + '%';

    // Color the score circle
    const circle = document.getElementById('scoreCircle');
    if (score >= 90) circle.style.borderColor = '#10b981'; circle.style.color = '#10b981';
    else if (score >= 60) circle.style.borderColor = '#f59e0b'; circle.style.color = '#f59e0b';
    else circle.style.borderColor = '#ef4444'; circle.style.color = '#ef4444';

    // Scroll to result
    document.getElementById('resultScreen').scrollIntoView({ behavior: 'smooth' });
}

function reviewAnswers() {
    examSubmitted = true;
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'block';
    currentIndex = 0;
    showQuestion(0);
    updateNavButtons();

    // Show all answers and explanations
    selectedQuestions.forEach(q => {
        const userAns = userAnswers[q.id];
        let isCorrect = false;

        if (q.type === 'single') {
            isCorrect = userAns === q.answer;
            document.querySelectorAll(`.option[data-qid="${q.id}"]`).forEach(opt => {
                opt.classList.add('disabled');
                const oidx = parseInt(opt.dataset.oidx);
                if (oidx === q.answer) opt.classList.add('correct-answer');
                if (oidx === userAns && !isCorrect) opt.classList.add('wrong-answer');
            });
        } else if (q.type === 'multi') {
            const sortedUser = userAns ? userAns.slice().sort() : [];
            const sortedCorrect = q.answer.slice().sort();
            isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
            document.querySelectorAll(`.option[data-qid="${q.id}"]`).forEach(opt => {
                opt.classList.add('disabled');
                const oidx = parseInt(opt.dataset.oidx);
                if (q.answer.includes(oidx)) opt.classList.add('correct-answer');
                if (userAns && userAns.includes(oidx) && !q.answer.includes(oidx)) opt.classList.add('wrong-answer');
            });
        } else if (q.type === 'judge') {
            isCorrect = userAns === q.answer;
            const trueBtn = document.querySelector(`.true-btn[data-qid="${q.id}"]`);
            const falseBtn = document.querySelector(`.false-btn[data-qid="${q.id}"]`);
            [trueBtn, falseBtn].forEach(b => { if (b) b.classList.add('disabled'); });
            if (q.answer === true && trueBtn) trueBtn.classList.add('correct-answer');
            if (q.answer === false && falseBtn) falseBtn.classList.add('correct-answer');
            if (userAns === true && !isCorrect && trueBtn) trueBtn.classList.add('wrong-answer');
            if (userAns === false && !isCorrect && falseBtn) falseBtn.classList.add('wrong-answer');
        }

        // Show explanation
        const explain = document.getElementById('explain-' + q.id);
        if (explain) {
            const markers = ['A','B','C','D','E','F'];
            let correctAnsStr = '';
            if (q.type === 'single') correctAnsStr = markers[q.answer];
            else if (q.type === 'multi') correctAnsStr = q.answer.map(i => markers[i]).join('');
            else correctAnsStr = q.answer ? '正确 ✅' : '错误 ❌';

            explain.innerHTML = `
                <strong>正确答案：</strong><span class="correct-ans">${correctAnsStr}</span>
                ${q.type === 'multi' ? '<span style="font-size:0.8rem;color:#94a3b8;">（全选对才得分）</span>' : ''}
                ${!isCorrect ? `<br><span style="color:#ef4444;">你的答案：${q.type === 'single' ? (userAns !== undefined ? markers[userAns] : '未作答') : q.type === 'multi' ? (userAns && userAns.length ? userAns.map(i => markers[i]).join('') : '未作答') : (userAns === true ? '正确' : userAns === false ? '错误' : '未作答')}</span>` : '<br><span style="color:#10b981;">✅ 回答正确</span>'}
            `;
            explain.classList.add('show');
        }

        // Card styling
        const card = document.getElementById('qcard-' + q.id);
        if (card) {
            if (isCorrect) card.classList.add('correct');
            else card.classList.add('wrong');
        }
    });

    // Update submit button text
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = '';
    document.getElementById('prevBtn').style.display = '';
    document.getElementById('progressText').textContent = '答案解析模式';
}

function retryExam() {
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'block';
    selectedQuestions = [];
    userAnswers = {};
    examSubmitted = false;
    currentIndex = 0;
}

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// Keyboard shortcut for submit
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        if (!examSubmitted && Object.keys(userAnswers).length === TOTAL) {
            submitExam();
        }
    }
});

// Init
init();
</script>
</body>
</html>
